<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho Mail Tester</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #inbox { margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 100px; background: #f9f9f9; }
        #debug { background: #e8f0fe; padding: 10px; margin-top: 10px; border: 1px solid #99c; white-space: pre-wrap; word-break: break-all; }
        button { background: #0078d4; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #005a9e; }
    </style>
</head>
<body>
    <h1>Zoho Mail Tester</h1>
    <button onclick="loginWithZoho()">Login with Zoho</button>
    <button onclick="loadInbox()">Load Zoho Inbox</button>
    <div id="debug">Debug info will appear here after login.</div>
    <div id="inbox">Inbox content will appear here.</div>

    <script>
        // ================== Configuration ==================
        const CLIENT_ID = '1000.KH21SIV5VTY4USU27F4S5E2WKAYUJB'; // Replace with your actual Client ID
        const REDIRECT_URI = window.location.origin + window.location.pathname; // auto-detects current page
        const SCOPE = 'ZohoMail.messages.ALL';
        const AUTH_URL = 'https://accounts.zoho.com/oauth/v2/auth';

        // ================== Helper functions ==================
        function getToken() {
            const hash = window.location.hash;
            if (!hash) return null;
            const params = new URLSearchParams(hash.slice(1));
            return params.get('access_token');
        }

        function loginWithZoho() {
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                scope: SCOPE,
                response_type: 'token',
                access_type: 'offline'
            });
            window.location.href = AUTH_URL + '?' + params.toString();
        }

        function loadInbox() {
            const token = getToken();
            const inboxDiv = document.getElementById('inbox');
            const debugDiv = document.getElementById('debug');

            if (!token) {
                inboxDiv.innerHTML = 'You are not logged in. Please click "Login with Zoho" first.';
                debugDiv.innerHTML = 'No token found.';
                return;
            }

            inboxDiv.innerHTML = 'Loading inbox...';
            debugDiv.innerHTML = 'Token found (first 20): ' + token.slice(0, 20) + '<br>Fetching accounts...';

            // Test 1: accounts endpoint (main API)
            fetch('https://mail.zoho.com/api/accounts', {
                headers: { 'Authorization': 'Zoho-oauthtoken ' + token }
            })
            .then(response => {
                debugDiv.innerHTML += '<br>Response status: ' + response.status;
                return response.text();
            })
            .then(text => {
                debugDiv.innerHTML += '<br>Raw response (first 500 chars):<br>' + text.slice(0, 500);
                try {
                    const data = JSON.parse(text);
                    inboxDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } catch (e) {
                    inboxDiv.innerHTML = 'Response is not JSON. Raw text (first 500):<br>' + text.slice(0, 500);
                }
            })
            .catch(error => {
                debugDiv.innerHTML += '<br>Error: ' + error.message;
                inboxDiv.innerHTML = 'Error fetching inbox: ' + error.message;
            });
        }

        // ================== Auto-run after login (page load) ==================
        window.onload = function() {
            const token = getToken();
            const debugDiv = document.getElementById('debug');
            const inboxDiv = document.getElementById('inbox');

            if (!token) {
                debugDiv.innerHTML = 'No token found. Please log in.';
                return;
            }

            debugDiv.innerHTML = 'Token found (first 20): ' + token.slice(0, 20) + '<br>Testing API automatically...';
            inboxDiv.innerHTML = 'Testing API...';

            // Test the accounts endpoint automatically
            fetch('https://mail.zoho.com/api/accounts', {
                headers: { 'Authorization': 'Zoho-oauthtoken ' + token }
            })
            .then(response => {
                debugDiv.innerHTML += '<br>Response status: ' + response.status;
                return response.text();
            })
            .then(text => {
                debugDiv.innerHTML += '<br>Raw response (first 500 chars):<br>' + text.slice(0, 500);
                try {
                    const data = JSON.parse(text);
                    inboxDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } catch (e) {
                    inboxDiv.innerHTML = 'Response is not JSON. Raw text (first 500):<br>' + text.slice(0, 500);
                }
            })
            .catch(error => {
                debugDiv.innerHTML += '<br>Error: ' + error.message;
                inboxDiv.innerHTML = 'Error: ' + error.message;
            });
        };
    </script>
</body>
</html>
