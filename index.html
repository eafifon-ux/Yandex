.badge{
  display:inline-block;

}

  font-size:.9em;
}

<body>

<header>
  <h1>GPC Mail</h1>
  <p>Global Perennial Calendar Email Layer</p>
  <div id="gpcNow"></div>
</header>

<div class="container">

  <div class="card">
    <h2>Login</h2>

    <div id="yandex-login"></div>
    

    <div id="profile" class="hidden">
      <p>
        Logged in as:
        <strong id="userEmail"></strong>
      </p>

      <div class="badge" id="userGPC"></div>
    </div>
  </div>

  <div class="card">
    <h2>Compose Mail</h2>

    <input id="to" placeholder="Recipient">

    <input id="subject" placeholder="Subject">

    <textarea id="body"
placeholder="Write your message..."></textarea>

    <button onclick="previewMail()">
      Preview GPC Layer
    </button>

    <div id="preview" style="margin-top:20px;"></div>
  </div>

  <div class="card">
    <h2>Inbox Preview</h2>

    <div id="inbox"></div>
  </div>

</div>

<script>

/* =========================
   GPC ENGINE
========================= */

const GPC = {

  epochUTC: Date.UTC(1982,2,24),
  epochYear: 5979,

  weekEmojis:[
    '🟠','🟤','🌺',
    '🌏','🟢','🔵','🟣'
  ],

  daysFromGregorian(d){
    return Math.floor(
      (d.getTime()-this.epochUTC)/86400000
    );
  },

  gpcFromDays(days){

    const mod=(a,b)=>((a%b)+b)%b;

    const leapWeeks=(r)=>{
      let l=0;
      if(mod(r,7)>=6) l+=7;
      if(mod(r,49)>=48) l+=7;
      if(mod(r+29,70)===0) l+=7;
      return l;
    };

    let y=this.epochYear;

    while(days>=0){

      const r=y-this.epochYear;
      const len=364+leapWeeks(r);

      if(days<len) break;

      days-=len;
      y++;
    }

    while(days<0){

      y--;

      const r=y-this.epochYear;
      const len=364+leapWeeks(r);

      days+=len;
    }

    return {
      year:y,
      doy:days+1
    };
  }

};

/* =========================
   DISPLAY CURRENT GPC
========================= */

function updateCurrentGPC(){

  const days =
    GPC.daysFromGregorian(new Date());

  const g =
    GPC.gpcFromDays(days);

  const emoji =
    GPC.weekEmojis[(g.doy-1)%7];

  document.getElementById("gpcNow")
    .innerHTML =
    `${emoji} ${g.year}.${String(g.doy).padStart(3,"0")}`;
}

updateCurrentGPC();

/* =========================
   YANDEX LOGIN
========================= */

/*
REGISTER APP:
https://oauth.yandex.com

Replace below with your app id
*/

const CLIENT_ID =
"e42e122f85384a2e802eef82503119e2";

{

  const redirect =
    encodeURIComponent(
      window.location.href
    );

  const url =
    "https://oauth.yandex.com/authorize" +
    "?response_type=token" +
    "&client_id=" + CLIENT_ID +
    "&redirect_uri=" + redirect;

  location.href = url;
}


/* =========================
   LOAD PROFILE
========================= */

async function loadProfile(){

  const token = getToken();

  if(!token) return;

  try{

    const res =
      await fetch(
        "https://login.yandex.ru/info",
        {
          headers:{
            Authorization:
              "OAuth " + token
          }
        }
      );

    const data = await res.json();

    document
      .getElementById("profile")
      .classList.remove("hidden");

    document
      .getElementById("userEmail")
      .textContent =
      data.default_email || "Yandex User";

    const days =
      GPC.daysFromGregorian(new Date());

    const g =
      GPC.gpcFromDays(days);

    document
      .getElementById("userGPC")
      .textContent =
      `Today in GPC: ${g.year}.${String(g.doy).padStart(3,"0")}`;

  }catch(err){

    console.error(err);
  }
}
function getToken(){

  const hash =
    window.location.hash.substring(1);

  const params =
    new URLSearchParams(hash);

  return params.get("access_token");
}

loadProfile();

/* =========================
   GPC STAMP
========================= */

function getGPCStamp(){

  const days =
    GPC.daysFromGregorian(new Date());

  const g =
    GPC.gpcFromDays(days);

  const emoji =
    GPC.weekEmojis[(g.doy-1)%7];

  return `${emoji} ${g.year}.${String(g.doy).padStart(3,"0")}`;
}

/* =========================
   DATE CONVERTER
========================= */

function convertGregorianDates(text){

  return text.replace(
    /\d{4}-\d{2}-\d{2}/g,

    d=>{

      const date =
        new Date(d+"T00:00:00Z");

      const g =
        GPC.gpcFromDays(
          GPC.daysFromGregorian(date)
        );

      return `${d} (${g.year}.${String(g.doy).padStart(3,"0")})`;
    }
  );
}

/* =========================
   PREVIEW MAIL
========================= */

function previewMail(){

  const to =
    document.getElementById("to").value;

  const subject =
    document.getElementById("subject").value;

  let body =
    document.getElementById("body").value;

  body =
    convertGregorianDates(body);

  const stamp =
    getGPCStamp();

  const finalMessage =

`[${stamp}]

${body}

----------------
Sent in GPC Time`;

  document.getElementById("preview")
    .innerHTML =

`
<div class="mail">
  <strong>To:</strong> ${to}<br>
  <strong>Subject:</strong> ${subject}<br>
  <div class="mail-date">${stamp}</div>

  <pre style="white-space:pre-wrap;font-family:inherit;">
${finalMessage}
  </pre>
</div>
`;

  addInboxPreview(subject,finalMessage,stamp);
}

/* =========================
   FAKE INBOX PREVIEW
========================= */

function addInboxPreview(subject,msg,stamp){

  const div =
    document.createElement("div");

  div.className = "mail";

  div.innerHTML = `
    <strong>${subject || "(No Subject)"}</strong>
    <div class="mail-date">${stamp}</div>

    <div class="small">
      ${msg.substring(0,120)}...
    </div>
  `;

  document
    .getElementById("inbox")
    .prepend(div);
}

window.onload = async () => {

  await window.YaAuthSuggest.init(
    {
      client_id: CLIENT_ID,

      response_type: 'token',

      redirect_uri:
      'https://eafifon-ux.github.io/Yandex/'
    },

    'https://eafifon-ux.github.io/Yandex/',

    {
      view: 'button',

      parentId: 'yandex-login',

      buttonView: 'main',

      buttonTheme: 'light',

      buttonSize: 'm',

      buttonBorderRadius: 12
    }
  );

  YaSendSuggestToken(
    'https://eafifon-ux.github.io/Yandex/'
  );

};
</script>
