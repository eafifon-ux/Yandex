<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPC Mail Layer</title>
  <style>
    body{
      margin:0;
      font-family:Georgia,serif;
      background:linear-gradient(to bottom,#eef6ff,#dcecff);
      color:#123;
    }
    header{
      background:#0b3c8c;
      color:white;
      padding:18px;
      text-align:center;
      box-shadow:0 2px 10px rgba(0,0,0,.15);
    }
    header h1{margin:0; font-size:2em;}
    header p{margin-top:6px; opacity:.9;}
    #gpcNow{margin-top:12px; font-size:1.2em; font-weight:bold;}
    .container{max-width:1000px; margin:25px auto; padding:20px;}
    .card{
      background:white;
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 4px 14px rgba(0,0,0,.08);
    }
    button{
      border:none;
      background:#1e6cff;
      color:white;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      margin:5px;
    }
    button:hover{opacity:.9;}
    input,textarea{
      width:100%;
      margin-top:10px;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccd;
      font-size:1em;
      box-sizing:border-box;
    }
    textarea{min-height:160px; resize:vertical;}
    .mail{border-bottom:1px solid #ddd; padding:12px 0;}
    .mail:last-child{border-bottom:none;}
    .mail-date{color:#1e6cff; font-weight:bold;}
    .badge{
      display:inline-block;
      background:#e8f1ff;
      color:#0b3c8c;
      padding:5px 10px;
      border-radius:999px;
      font-size:.9em;
      margin-top:8px;
    }
    .hidden{display:none;}
  </style>
</head>
<body>
  <header>
    <h1>GPC Mail Layer</h1>
    <p>Global Perennial Calendar Email Layer</p>
    <div id="gpcNow"></div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Login with Zoho</h2>
      <div id="zoho-login"></div>
      <div id="profile" class="hidden">
        <p>Logged in as: <strong id="userEmail"></strong></p>
        <div class="badge" id="userGPC"></div>
      </div>
    </div>

    <div class="card">
      <h2>Compose GPC Mail</h2>
      <input id="to" placeholder="Recipient email">
      <input id="subject" placeholder="Subject">
      <textarea id="body" placeholder="Write your message..."></textarea>
      <button onclick="previewMail()">Preview</button>
      <button onclick="sendZohoMail()">Send via Zoho</button>
      <div id="preview" style="margin-top:20px;"></div>
    </div>

    <div class="card">
      <h2>Inbox (GPC Enhanced)</h2>
      <button onclick="fetchZohoInbox()">Load Inbox</button>
      <div id="inbox"></div>
    </div>
  </div>

  <script>
    // ==================== GPC ENGINE ====================
    const GPC = {
      epochUTC: Date.UTC(1982,2,24),
      epochYear: 5979,
      weekEmojis: ['🟠','🟤','🌺','🌏','🟢','🔵','🟣'],

      daysFromGregorian(d){
        return Math.floor((d.getTime()-this.epochUTC)/86400000);
      },

      gpcFromDays(days){
        const mod=(a,b)=>((a%b)+b)%b;
        const leapWeeks=(r)=>{ let l=0; if(mod(r,7)>=6) l+=7; if(mod(r,49)>=48) l+=7; if(mod(r+29,70)===0) l+=7; return l; };
        let y=this.epochYear;
        while(days>=0){
          const r=y-this.epochYear;
          const len=364+leapWeeks(r);
          if(days<len) break;
          days-=len; y++;
        }
        while(days<0){
          y--;
          const r=y-this.epochYear;
          const len=364+leapWeeks(r);
          days+=len;
        }
        return {year:y, doy:days+1};
      }
    };

    function updateCurrentGPC(){
      const days = GPC.daysFromGregorian(new Date());
      const g = GPC.gpcFromDays(days);
      const emoji = GPC.weekEmojis[(g.doy-1)%7];
      document.getElementById("gpcNow").innerHTML = `${emoji} \( {g.year}. \){String(g.doy).padStart(3,"0")}`;
    }
    updateCurrentGPC();

    function getGPCStamp(){
      const days = GPC.daysFromGregorian(new Date());
      const g = GPC.gpcFromDays(days);
      const emoji = GPC.weekEmojis[(g.doy-1)%7];
      return `${emoji} \( {g.year}. \){String(g.doy).padStart(3,"0")}`;
    }

    function convertGregorianDates(text){
      return text.replace(/\d{4}-\d{2}-\d{2}/g, d => {
        const date = new Date(d+"T00:00:00Z");
        const g = GPC.gpcFromDays(GPC.daysFromGregorian(date));
        return `\( {d} ( \){g.year}.${String(g.doy).padStart(3,"0")})`;
      });
    }

    // ==================== ZOHO CONFIG ====================
    const CLIENT_ID = "1000.KH21SIV5VTY4USU27F4S5E2WKAYUJB";
    const REDIRECT_URI = "https://eafifon-ux.github.io/Yandex/";
    const ACCOUNTS_URL = "https://accounts.zoho.com";   // Change to .eu if needed

    function getToken(){
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return params.get("access_token");
    }

    async function loadProfile(){
      const token = getToken();
      if(!token) return;

      try {
        const res = await fetch(`${ACCOUNTS_URL}/oauth/user/info`, {
          headers: { Authorization: "Zoho-oauthtoken " + token }
        });
        const data = await res.json();

        document.getElementById("profile").classList.remove("hidden");
        document.getElementById("userEmail").textContent = data.email || "Zoho User";

        const g = GPC.gpcFromDays(GPC.daysFromGregorian(new Date()));
        document.getElementById("userGPC").textContent = `Today in GPC: \( {g.year}. \){String(g.doy).padStart(3,"0")}`;
      } catch(e){ console.error(e); }
    }

    // ==================== INBOX ====================
    async function fetchZohoInbox(){
      const token = getToken();
      if(!token){ alert("Please login first"); return; }

      const inboxDiv = document.getElementById("inbox");
      inboxDiv.innerHTML = "<p>Loading...</p>";

      try {
        // First get account ID
        const accRes = await fetch("https://mail.zoho.com/api/accounts", {
          headers: { Authorization: "Zoho-oauthtoken " + token }
        });
        const accData = await accRes.json();
        const accountId = accData.data[0].accountId;

        // Get recent messages
        const msgRes = await fetch(`https://mail.zoho.com/api/accounts/${accountId}/messages/view?limit=10`, {
          headers: { Authorization: "Zoho-oauthtoken " + token }
        });
        const msgData = await msgRes.json();

        inboxDiv.innerHTML = "";
        msgData.data.forEach(mail => {
          const div = document.createElement("div");
          div.className = "mail";
          const stamp = getGPCStamp();
          div.innerHTML = `
            <strong>${mail.subject || "(No Subject)"}</strong><br>
            <small>From: ${mail.sender}</small>
            <div class="mail-date">${stamp}</div>
          `;
          inboxDiv.appendChild(div);
        });
      } catch(e){
        console.error(e);
        inboxDiv.innerHTML = "<p>Error loading inbox. Check console.</p>";
      }
    }

    // ==================== SEND MAIL ====================
    async function sendZohoMail(){
      const token = getToken();
      if(!token){ alert("Please login first"); return; }

      // This is a simplified version - full send requires more setup
      alert("Send functionality is partially implemented.\n\nFor full sending, we may need to use Zoho's send API endpoint.");
      previewMail(); // fallback to preview
    }

    function previewMail(){
      const to = document.getElementById("to").value;
      const subject = document.getElementById("subject").value;
      let body = document.getElementById("body").value;

      body = convertGregorianDates(body);
      const stamp = getGPCStamp();

      const finalMessage = `[\( {stamp}]\n\n \){body}\n\n----------------\nSent in GPC Time`;

      document.getElementById("preview").innerHTML = `
        <div class="mail">
          <strong>To:</strong> ${to}<br>
          <strong>Subject:</strong> ${subject}<br>
          <div class="mail-date">${stamp}</div>
          <pre style="white-space:pre-wrap;">${finalMessage}</pre>
        </div>
      `;
    }

    // ==================== INIT ZOHO LOGIN ====================
    window.onload = () => {
      loadProfile();

      // Simple button for now (you can replace with Zoho's SDK if preferred)
      const loginDiv = document.getElementById("zoho-login");
      const scopes = "ZohoMail.messages.ALL,ZohoMail.accounts.READ,ZohoMail.messages.READ";
      
      const authUrl = `${ACCOUNTS_URL}/oauth/v2/auth?` +
        `scope=${encodeURIComponent(scopes)}` +
        `&client_id=${CLIENT_ID}` +
        `&response_type=token` +
        `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
        `&access_type=offline`;

      loginDiv.innerHTML = `<button onclick="window.location='${authUrl}'">Login with Zoho Mail</button>`;
    };
  </script>
</body>
</html>
