<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPC Mail</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: linear-gradient(to bottom, #eef6ff, #dcecff);
            color: #123;
        }

        header {
            background: #0b3c8c;
            color: white;
            padding: 18px;
            text-align: center;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
        }

        header h1 {
            margin: 0;
            font-size: 2em;
        }

        header p {
            margin-top: 6px;
            opacity: .9;
        }

        #gpcNow {
            margin-top: 12px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 25px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .08);
        }

        button {
            border: none;
            background: #1e6cff;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background: #99b;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            opacity: .9;
        }

        input,
        textarea {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccd;
            font-size: 1em;
            box-sizing: border-box;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        .mail {
            border-bottom: 1px solid #ddd;
            padding: 14px 0;
        }

        .mail:last-child {
            border-bottom: none;
        }

        .mail-subject {
            font-weight: bold;
            font-size: 1.05em;
        }

        .mail-sender {
            color: #555;
            font-size: .95em;
        }

        .mail-date {
            color: #1e6cff;
            font-weight: bold;
            font-size: .9em;
        }

        .mail-gpc {
            display: inline-block;
            background: #e8f1ff;
            color: #0b3c8c;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: .8em;
            margin-left: 8px;
        }

        .mail-preview {
            color: #666;
            font-size: .9em;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            display: inline-block;
            background: #e8f1ff;
            color: #0b3c8c;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: .9em;
            margin-top: 8px;
        }

        .hidden {
            display: none;
        }

        .loading {
            opacity: .6;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: .9em;
        }

        .error-message {
            color: #b00;
            background: #ffe0e0;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>GPC Mail</h1>
        <p>Global Perennial Calendar Email Layer</p>
        <div id="gpcNow"></div>
    </header>

    <div class="container">

        <div class="card">
            <h2>Login with Zoho</h2>
            <div id="zoho-login"></div>

            <div id="profile" class="hidden">
                <p>Logged in as: <strong id="userEmail"></strong></p>
                <div class="badge" id="userGPC"></div>
            </div>
        </div>

        <div class="card">
            <h2>Compose Mail</h2>
            <input id="to" placeholder="Recipient">
            <input id="subject" placeholder="Subject">
            <textarea id="body" placeholder="Write your message..."></textarea>
            <button onclick="previewMail()">Preview GPC Layer</button>
            <div id="preview" style="margin-top:20px;"></div>
        </div>

        <div class="card">
            <h2>Inbox (Debug Mode)</h2>
            <button id="loadInboxBtn" onclick="fetchZohoInbox()">Load Zoho Inbox</button>
            <div id="inbox"></div>
        </div>

    </div>

    <script>
        /* =========================
           GPC ENGINE
        ========================= */
        const GPC = {
            epochUTC: Date.UTC(1982, 2, 24),
            epochYear: 5979,
            weekEmojis: ['🟠', '🟤', '🌺', '🌏', '🟢', '🔵', '🟣'],

            daysFromGregorian(d) {
                return Math.floor((d.getTime() - this.epochUTC) / 86400000);
            },

            gpcFromDays(days) {
                const mod = (a, b) => ((a % b) + b) % b;
                const leapWeeks = (r) => {
                    let l = 0;
                    if (mod(r, 7) >= 6) l += 7;
                    if (mod(r, 49) >= 48) l += 7;
                    if (mod(r + 29, 70) === 0) l += 7;
                    return l;
                };
                let y = this.epochYear;
                while (days >= 0) {
                    const r = y - this.epochYear;
                    const len = 364 + leapWeeks(r);
                    if (days < len) break;
                    days -= len;
                    y++;
                }
                while (days < 0) {
                    y--;
                    const r = y - this.epochYear;
                    const len = 364 + leapWeeks(r);
                    days += len;
                }
                return { year: y, doy: days + 1 };
            }
        };

        /* =========================
           Display GPC in header
        ========================= */
        function updateCurrentGPC() {
            const days = GPC.daysFromGregorian(new Date());
            const g = GPC.gpcFromDays(days);
            const emoji = GPC.weekEmojis[(g.doy - 1) % 7];
            document.getElementById("gpcNow").innerHTML =
                `${emoji} ${g.year}.${String(g.doy).padStart(3, "0")}`;
        }
        updateCurrentGPC();

        /* =========================
           Zoho config
        ========================= */
        const CLIENT_ID = "1000.KH21SIV5VTY4USU27F4S5E2WKAYUJB";
        const REDIRECT_URI = "https://eafifon-ux.github.io/Yandex/";
        const ACCOUNTS_URL = "https://accounts.zoho.com";

        function getToken() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            return params.get("access_token");
        }

        /* =========================
           Load profile
        ========================= */
        async function loadProfile() {
            const token = getToken();
            if (!token) return;

            try {
                const proxyUrl = "https://corsproxy.io/?";
                const targetUrl = `${ACCOUNTS_URL}/oauth/user/info`;
                const res = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    headers: { Authorization: "Zoho-oauthtoken " + token }
                });
                if (!res.ok) {
                    console.warn("Profile fetch failed – token may be invalid");
                    return;
                }
                const data = await res.json();
                document.getElementById("profile").classList.remove("hidden");
                document.getElementById("userEmail").textContent = data.email || "Zoho User";
                const g = GPC.gpcFromDays(GPC.daysFromGregorian(new Date()));
                document.getElementById("userGPC").textContent =
                    `Today in GPC: ${g.year}.${String(g.doy).padStart(3, "0")}`;
            } catch (err) {
                console.error(err);
            }
        }

        /* =========================
           GPC stamp & helpers
        ========================= */
        function getGPCStamp() {
            const days = GPC.daysFromGregorian(new Date());
            const g = GPC.gpcFromDays(days);
            const emoji = GPC.weekEmojis[(g.doy - 1) % 7];
            return `${emoji} ${g.year}.${String(g.doy).padStart(3, "0")}`;
        }

        function gpcFromDate(date) {
            const days = GPC.daysFromGregorian(date);
            const g = GPC.gpcFromDays(days);
            const emoji = GPC.weekEmojis[(g.doy - 1) % 7];
            return `${emoji} ${g.year}.${String(g.doy).padStart(3, "0")}`;
        }

        function convertGregorianDates(text) {
            return text.replace(/\d{4}-\d{2}-\d{2}/g, d => {
                const date = new Date(d + "T00:00:00Z");
                const g = GPC.gpcFromDays(GPC.daysFromGregorian(date));
                return `${d} (${g.year}.${String(g.doy).padStart(3, "0")})`;
            });
        }

        /* =========================
           Preview Mail
        ========================= */
        function previewMail() {
            const to = document.getElementById("to").value;
            const subject = document.getElementById("subject").value;
            let body = document.getElementById("body").value;
            body = convertGregorianDates(body);
            const stamp = getGPCStamp();

            const finalMessage =
                `[${stamp}]\n\n${body}\n\n----------------\nSent in GPC Time`;

            document.getElementById("preview").innerHTML = `
                <div class="mail">
                  <strong>To:</strong> ${to}<br>
                  <strong>Subject:</strong> ${subject}<br>
                  <div class="mail-date">${stamp}</div>
                  <pre style="white-space:pre-wrap;font-family:inherit;">${finalMessage}</pre>
                </div>
              `;
        }

        /* =========================
           Fixed fetchZohoInbox – uses CORS proxy + 401 handling
        ========================= */
        async function fetchZohoInbox() {
            const token = getToken();
            if (!token) {
                document.getElementById("inbox").innerHTML = 
                    `<div class="error-message">⚠️ No token found. Please <button onclick="window.location.reload()">login first</button>.</div>`;
                return;
            }
            const inboxDiv = document.getElementById("inbox");
            inboxDiv.innerHTML = "Token (first 20): " + token.substring(0, 20) + "<br>Loading...";
            try {
                const proxyUrl = "https://corsproxy.io/?";
                const targetUrl = "https://mail.zoho.com/api/accounts";
                const res = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    headers: { Authorization: "Zoho-oauthtoken " + token }
                });

                if (res.status === 401) {
                    const errData = await res.json();
                    inboxDiv.innerHTML = `
                        <div class="error-message">
                            ❌ Token invalid or expired: ${errData.status?.description || "Unauthorized"}<br>
                            <button onclick="window.location.reload()">🔄 Re-login with Zoho</button>
                        </div>
                    `;
                    return;
                }

                if (!res.ok) {
                    const errText = await res.text();
                    inboxDiv.innerHTML = `<p>HTTP error ${res.status}: ${errText}</p>`;
                    return;
                }

                const data = await res.json();
                inboxDiv.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
            } catch (e) {
                inboxDiv.innerHTML = `<p>Network/JS error: ${e.message}</p>`;
            }
        }

        /* =========================
           Init Zoho login
        ========================= */
        window.onload = () => {
            loadProfile();

            const loginDiv = document.getElementById("zoho-login");
            const scopes = "ZohoMail.messages.ALL,ZohoMail.accounts.READ,ZohoMail.messages.READ,ZohoMail.folders.READ";

            const authUrl =
                `${ACCOUNTS_URL}/oauth/v2/auth?` +
                `scope=${encodeURIComponent(scopes)}` +
                `&client_id=${CLIENT_ID}` +
                `&response_type=token` +
                `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;

            loginDiv.innerHTML =
                `<button onclick="window.location.href='${authUrl}'" style="padding:14px 24px;font-size:1.1em;">Login with Zoho</button>`;
        };
    </script>

</body>
</html>
